<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity | Secure MFA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: #818cf8;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-text: #34d399;
            --success-border: rgba(16, 185, 129, 0.2);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-text: #f87171;
            --error-border: rgba(239, 68, 68, 0.2);
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-text: #fbbf24;
            --warning-border: rgba(245, 158, 11, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.15);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(14, 165, 233, 0.1);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(50px) translateX(50px); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .auth-card:hover {
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99,102,241,0.2) 0%, rgba(14,165,233,0.2) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            color: #38bdf8;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0 0 1.5rem 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .notification-banner {
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            text-align: left;
            backdrop-filter: blur(5px);
        }

        .notification-icon {
            color: var(--warning-text);
            flex-shrink: 0;
            margin-top: 0.125rem;
        }

        .notification-content p {
            margin: 0;
            font-size: 0.85rem;
            color: #fde68a;
            line-height: 1.4;
        }

        .notification-content p strong {
            display: block;
            margin-bottom: 0.3rem;
            color: var(--warning-text);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .otp-input-wrapper {
            position: relative;
            max-width: 260px;
            margin: 0 auto;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.4em;
            text-indent: 0.2em; /* visual center compensation */
            color: var(--text-main);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.3);
            font-weight: 300;
        }

        input:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button[type="submit"]:hover {
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        button[type="submit"]:hover::before {
            left: 150%;
        }

        button[type="submit"]:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        button[type="submit"]:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            color: #94a3b8;
        }

        .spinner {
            animation: rotate 2s linear infinite;
            display: none;
            width: 1.25rem;
            height: 1.25rem;
        }

        .spinner circle {
            stroke: currentColor;
            stroke-width: 4;
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 200; stroke-dashoffset: -35px; }
            100% { stroke-dasharray: 90, 200; stroke-dashoffset: -124px; }
        }

        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 400;
            display: none;
            align-items: center;
            gap: 0.75rem;
            text-align: left;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
            display: flex;
        }

        .message.error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            display: flex;
        }

        .back-link {
            margin-top: 2rem;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--text-main);
        }

        svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="auth-card">
            <div class="header">
                <div class="logo-container">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M12 8v4"></path>
                        <path d="M12 16h.01"></path>
                    </svg>
                </div>
                <h1>Identity Verification</h1>
                <p>We've dispatched a secure token to your registered communication channel.</p>
            </div>

            <div class="notification-banner">
                <svg class="notification-icon" viewBox="0 0 24 24" width="22" height="22">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <div class="notification-content">
                    <p><strong>Action Required</strong>Check Telegram for your 6-digit access code. Token expires in 60 seconds.</p>
                </div>
            </div>

            <form id="otpForm">
                <div class="form-group">
                    <div class="otp-input-wrapper">
                        <input type="text" id="otp" name="otp" required maxlength="6" pattern="[0-9]{6}" placeholder="------"
                            autocomplete="one-time-code" inputmode="numeric" autofocus>
                    </div>
                </div>

                <button type="submit" id="verifyBtn">
                    <span id="btnText">Establish Secure Connection</span>
                    <svg class="spinner" viewBox="25 25 50 50">
                        <circle cx="50" cy="50" r="20" fill="none"></circle>
                    </svg>
                </button>
            </form>

            <div id="message" class="message">
                <svg id="msgIcon" viewBox="0 0 24 24" width="20" height="20" style="flex-shrink:0"></svg>
                <span id="msgText"></span>
            </div>

            <div class="back-link">
                <a href="/">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Terminate Session
                </a>
            </div>
        </div>
    </div>

    <script>
        const otpForm = document.getElementById('otpForm');
        const messageDiv = document.getElementById('message');
        const msgText = document.getElementById('msgText');
        const msgIcon = document.getElementById('msgIcon');
        const verifyBtn = document.getElementById('verifyBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.querySelector('.spinner');
        const otpInput = document.getElementById('otp');

        function showMessage(text, type) {
            msgText.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'flex';
            
            if (type === 'success') {
                msgIcon.innerHTML = `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>`;
            } else {
                msgIcon.innerHTML = `<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>`;
            }
        }

        window.addEventListener('load', function () {
            const username = sessionStorage.getItem('username');
            if (!username) {
                showMessage('Authentication context missing. Redirecting...', 'error');
                setTimeout(() => window.location.href = '/', 2000);
            }
        });

        otpInput.addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                verifyBtn.focus();
            }
        });

        otpForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            messageDiv.style.display = 'none';
            const username = sessionStorage.getItem('username');
            const otp = otpInput.value;

            if (!username) {
                showMessage('Session expired. Redirecting to login...', 'error');
                setTimeout(() => window.location.href = '/', 2000);
                return;
            }

            if (otp.length !== 6) {
                showMessage('Invalid token format. 6 digits required.', 'error');
                return;
            }

            verifyBtn.disabled = true;
            btnText.textContent = 'Verifying Signature...';
            spinner.style.display = 'block';

            try {
                const response = await fetch('/verify_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, otp: otp })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message || 'Signature verified. Access granted.', 'success');
                    sessionStorage.removeItem('username');
                    
                    otpForm.style.opacity = '0.5';
                    otpForm.style.pointerEvents = 'none';

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1800);
                } else {
                    showMessage(data.message, 'error');

                    if (data.force_relogin) {
                        sessionStorage.removeItem('username');
                        setTimeout(() => window.location.href = '/', 2000);
                    } else {
                        resetBtn();
                        otpInput.value = '';
                        otpInput.focus();
                    }
                }
            } catch (error) {
                showMessage('Network anomaly detected. Please retry.', 'error');
                resetBtn();
            }
        });

        function resetBtn() {
            verifyBtn.disabled = false;
            btnText.textContent = 'Establish Secure Connection';
            spinner.style.display = 'none';
        }
    </script>
</body>
</html>
